{% extends "base.html" %}
{% block title %}Create course{% endblock %}
{% block content %}
<div class="auth-shell my-4" style="max-width: 760px;">
  <section class="hero-panel mb-4">
    <span class="hero-panel__eyebrow">Teacher hub</span>
    <h1 class="hero-panel__title">Create a new course</h1>
    <p class="hero-panel__subtitle">Give your course a clear title and a concise description for students.</p>
  </section>
  <div class="card auth-card"><div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="field"><label for="id_title">Title</label>{{ form.title }}</div>
      <div class="field"><label for="id_description">Description</label>{{ form.description }}</div>
      <div class="row mt-4">
        <button class="button" type="submit">Create course</button>
        <a class="button button--ghost" href="{% url 'teacher-dashboard' %}">Cancel</a>
      </div>
    </form>
  </div></div>
</div>
{% endblock %}
